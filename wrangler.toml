name = "tl-temp-backend"
main = "src/worker.ts"
compatibility_date = "2026-04-25"

[observability]
enabled = true

# --- STAGING ENVIRONMENT ---
[env.staging]
name = "tl-temp-backend-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
FRONTEND_ORIGIN = "https://staging.transferlegacy.com"
SUPABASE_URL = "https://fwfxgweiggqmtdmwlhnz.supabase.co"
RESEND_FROM_EMAIL = "Transfer Legacy <waitlist@staging.transferlegacy.com>"
RESEND_FROM_NAME = "Transfer Legacy (Staging)"
OPS_ADMIN_EMAIL = "admin@staging.transferlegacy.com"
BACKBLAZE_B2_BUCKET_NAME = "tl-user-files-staging"
BACKBLAZE_B2_PUBLIC_ASSETS_BUCKET_NAME = "tl-public-assets-staging"
BACKBLAZE_B2_ENDPOINT_URL = "https://s3.us-west-000.backblazeb2.com"
BACKBLAZE_B2_REGION = "us-west-000"

# Note: The following secrets must be set via: wrangler secret put <KEY> --env staging
# SUPABASE_SECRET_KEY, RESEND_API_KEY, OPS_ADMIN_PASSWORD, OPS_JWT_SECRET, BACKBLAZE_B2_KEY_ID, BACKBLAZE_B2_APP_KEY

# --- PRODUCTION ENVIRONMENT ---
[env.production]
name = "tl-temp-backend-production"

[env.production.vars]
ENVIRONMENT = "production"
FRONTEND_ORIGIN = "https://transferlegacy.com"
SUPABASE_URL = "https://fwfxgweiggqmtdmwlhnz.supabase.co"
RESEND_FROM_EMAIL = "Transfer Legacy <waitlist@transferlegacy.com>"
RESEND_FROM_NAME = "Transfer Legacy"
OPS_ADMIN_EMAIL = "admin@transferlegacy.com"
BACKBLAZE_B2_BUCKET_NAME = "tl-user-files-prod"
BACKBLAZE_B2_PUBLIC_ASSETS_BUCKET_NAME = "tl-public-assets-prod"
BACKBLAZE_B2_ENDPOINT_URL = "https://s3.us-west-000.backblazeb2.com"
BACKBLAZE_B2_REGION = "us-west-000"

# Note: The following secrets must be set via: wrangler secret put <KEY> --env production
# SUPABASE_SECRET_KEY, RESEND_API_KEY, OPS_ADMIN_PASSWORD, OPS_JWT_SECRET, BACKBLAZE_B2_KEY_ID, BACKBLAZE_B2_APP_KEY
